<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quntis Preview + Cowart Workspace</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050606;
        --surface: #0b0d0f;
        --line: rgba(255, 255, 255, 0.14);
        --muted: #aeb7c4;
        --ink: #f6f7f7;
        --accent: #f55625;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Manrope, "Helvetica Neue", Arial, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .workspace-shell {
        display: grid;
        grid-template-rows: 42px minmax(0, 1fr);
        width: 100vw;
        height: 100vh;
      }

      .workspace-bar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 6, 6, 0.96);
      }

      .workspace-title {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .workspace-status {
        justify-self: center;
        color: #fff;
        font-size: 12px;
        font-weight: 850;
      }

      .workspace-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .workspace-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
        text-decoration: none;
      }

      .workspace-actions a:hover {
        border-color: rgba(245, 86, 37, 0.65);
        color: #fff;
      }

      .pane-grid {
        display: grid;
        grid-template-columns: minmax(420px, 58fr) minmax(360px, 42fr);
        min-height: 0;
      }

      .pane {
        display: grid;
        grid-template-rows: 34px minmax(0, 1fr);
        min-width: 0;
        min-height: 0;
        border-right: 1px solid var(--line);
        background: #050606;
      }

      .pane:last-child {
        border-right: 0;
      }

      .pane-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
        background: var(--surface);
      }

      .pane-label strong {
        color: #fff;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .pane-label span {
        overflow: hidden;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        border: 0;
        background: #050606;
      }

      .divider {
        color: var(--accent);
      }

      @media (max-width: 980px) {
        body {
          overflow: auto;
        }

        .workspace-shell {
          height: auto;
          min-height: 100vh;
          overflow: visible;
        }

        .workspace-bar {
          grid-template-columns: 1fr;
          height: auto;
          padding: 10px 12px;
        }

        .workspace-status,
        .workspace-actions {
          justify-self: start;
        }

        .pane-grid {
          grid-template-columns: 1fr;
        }

        .pane {
          height: 80vh;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main class="workspace-shell">
      <header class="workspace-bar">
        <div class="workspace-title">Quntis Amazon Storefront</div>
        <div class="workspace-status">Preview <span class="divider">/</span> Cowart</div>
        <nav class="workspace-actions" aria-label="Workspace links">
          <a href="http://127.0.0.1:5177/" target="_blank" rel="noreferrer">Open Preview</a>
          <a href="http://127.0.0.1:43217/" target="_blank" rel="noreferrer">Open Cowart</a>
        </nav>
      </header>

      <section class="pane-grid" aria-label="Side by side workspace">
        <article class="pane">
          <div class="pane-label">
            <strong>Preview</strong>
            <span>http://127.0.0.1:5177/</span>
          </div>
          <iframe title="Quntis Amazon Storefront Preview" src="http://127.0.0.1:5177/"></iframe>
        </article>

        <article class="pane">
          <div class="pane-label">
            <strong>Cowart</strong>
            <span>http://127.0.0.1:43217/</span>
          </div>
          <iframe title="Cowart Canvas" src="http://127.0.0.1:43217/"></iframe>
        </article>
      </section>
    </main>
  </body>
</html>
